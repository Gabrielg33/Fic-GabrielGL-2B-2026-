<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Atividades JavaScript</title>
  <link rel="stylesheet" href="desafios.css" />
</head>

<body>

  <h1> Atividades JavaScript</h1>


  <hr>
  <h2> Coleta de Informações</h2>

  <input type="text" id="nome" placeholder="Nome" />
  <input type="number" id="idade" placeholder="Idade" />
  <input type="number" id="nota1" placeholder="Nota 1" />
  <input type="number" id="nota2" placeholder="Nota 2" />
  <input type="number" id="nota3" placeholder="Nota 3" />
  <button onclick="coletarInfo()">Adicionar Pessoa</button>
  <p id="msg-coleta"></p>


  <hr>
  <h2> Processamento de String com Split</h2>

  <input type="text" id="frase" placeholder="Digite palavras separadas por vírgula" />
  <button onclick="processarString()">Processar</button>

  <div class="resultado" id="resultado-split"></div>


  <hr>

  <h2> Apresentação de Dados</h2>

  <button onclick="apresentarDados()">Mostrar Lista</button>

  <div class="resultado" id="lista-dados"></div>


  <hr>
  <h2>Processamento e Tipos de Dados</h2>

  <input type="text" id="valor" placeholder="Digite qualquer valor" />
  <button onclick="testarTipo()">Testar Tipo</button>

  <div class="resultado" id="resultado-tipo"></div>

  <script src="desafios.js"></script>
</body>

</html>
